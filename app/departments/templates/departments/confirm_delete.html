{% extends "users/base.html" %}

{% block title %}
Delete Department
{% endblock %}

{% block content %}
        <div class="card w-50 mx-auto shadow border-danger">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Confirm Deletion</h4>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete the department: <strong>"{{ object.name }}"</strong>?</p>
            <p class="text-danger"><small>This action cannot be undone.</small></p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'department-list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
