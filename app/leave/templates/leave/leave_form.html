{% extends "users/base.html" %}

{% block title %}
Apply Leave
{% endblock %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">

        <h4>Apply Leave</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary"
            >
                Save
            </button>

            <a
                href="{% url 'leave-list' %}"
                class="btn btn-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
