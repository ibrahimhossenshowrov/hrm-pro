<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HRM System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:400px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#777;
            font-size:14px;
            margin-bottom:25px;
            line-height:1.5;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#555;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
            margin-bottom:20px;
            transition:.3s;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:13px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .back{
            text-align:center;
            margin-top:20px;
        }

        .back a{
            text-decoration:none;
            color:#2563eb;
            font-size:14px;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            font-size:13px;
            color:#888;
        }
    </style>

</head>
<body>

<div class="card">

    <h2>Forgot Password</h2>

    <p>
        Enter your email address below.
        We'll send you a password reset link.
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Email Address</label>

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        <button type="submit">
            Send Reset Link
        </button>

    </form>

    <div class="back">
        <a href="{% url 'login' %}">
            ← Back to Login
        </a>
    </div>

    <div class="footer">
        © 2026 HRM Software
    </div>

</div>

</body>
</html>
